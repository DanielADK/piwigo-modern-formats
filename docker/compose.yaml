services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: piwigo
      MARIADB_DATABASE: piwigo
      MARIADB_USER: piwigo
      MARIADB_PASSWORD: piwigo
    volumes:
      - dbdata:/var/lib/mysql

  piwigo:
    image: lscr.io/linuxserver/piwigo:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Prague
    ports:
      - "8080:80"
    volumes:
      - pwgconfig:/config
      # The plugin's folder MUST be "modern_formats" (= its id). The linuxserver
      # image serves Piwigo from /app/www/public, whose plugins/ symlinks to
      # /config/www/plugins.
      - ../:/config/www/plugins/modern_formats:ro
    depends_on:
      - db

volumes:
  dbdata:
  pwgconfig:
